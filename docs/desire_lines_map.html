    body {
  margin: 0;
  padding: 0;
  overflow: hidden;
}

#deck-container {
  width: 100vw;
  height: 100vh;
}

#deck-container canvas {
  z-index: 1;
  background: none;
}

#deck-container .error_text {
  color: red;
  background: none;
  position: absolute;
  z-index: 100;
}
    </style>

    <div id="deck-container">
    </div>
  
<style id="legend-style">
  .legend-box {
    position: fixed;
    bottom: 18px;
    left: 18px;
    z-index: 9999;
    background: rgba(255, 255, 255, 0.94);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(0, 0, 0, 0.1);
    border-radius: 10px;
    padding: 12px 14px;
    box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    font-size: 13px;
    line-height: 1.45;
    color: #181818;
    max-width: 280px;
  }
  .legend-box.dark {
    background: rgba(12, 16, 24, 0.82);
    border-color: rgba(255, 255, 255, 0.12);
    color: #e5e5e5;
  }
  .legend-box h4 {
    margin: 0 0 8px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: -0.005em;
  }
  .legend-row {
    display: flex;
    align-items: center;
    margin: 4px 0;
    font-size: 12.5px;
  }
  .legend-sw {
    display: inline-block;
    width: 16px;
    height: 16px;
    border-radius: 3px;
    margin-right: 9px;
    flex-shrink: 0;
    border: 1px solid rgba(0,0,0,0.12);
  }
  .legend-sw.circle { border-radius: 50%; }
  .legend-sw.line   { height: 4px; margin-top: 6px; margin-bottom: 6px; }
  .legend-sw.arc    { height: 3px; background: linear-gradient(90deg, var(--l) 0%, var(--r) 100%); margin-top: 6px; margin-bottom: 6px; }
  .legend-note {
    margin-top: 8px;
    font-size: 11.5px;
    color: #555;
    line-height: 1.35;
  }
  .legend-box.dark .legend-note { color: #aab4c4; }
  .legend-gradient {
    height: 10px;
    width: 100%;
    border-radius: 5px;
    margin: 6px 0 3px;
  }
  .legend-scale {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: #666;
    margin-bottom: 4px;
  }
  .legend-box.dark .legend-scale { color: #aab4c4; }
</style>
<div class="legend-box"><h4>Top desire lines</h4><div class="legend-gradient" style="background: linear-gradient(90deg, rgb(255,180,60) 0%, rgb(255,40,30) 100%);"></div><div class="legend-scale"><span>10×</span><span>affinity score</span><span>100×</span></div><div class="legend-note">Affinity = actual trips ÷ gravity-model expectation (K · cap_a · cap_b / dist^1.59). Width ∝ log(trips). Station pairs above the 75th-percentile affinity with ≥ 300 trips and ≥ 300 m apart.</div></div>
</body>
